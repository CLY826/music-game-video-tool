name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            tests/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install test dependencies
        run: npm ci
        working-directory: tests

      - name: Lint cloud functions
        run: npx eslint cloudfunctions/ --max-warnings 0

      - name: Run backend tests
        run: npx jest --config jest.backend.config.js --ci --coverage --coverageReporters=text --coverageReporters=lcov
        working-directory: tests

      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: tests/coverage/backend/lcov.info
          flags: backend
          verbose: true

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            tests/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install test dependencies
        run: npm ci
        working-directory: tests

      - name: Lint pages
        run: npx eslint pages/ --max-warnings 0

      - name: Run frontend tests
        run: npx jest --config jest.frontend.config.js --ci --coverage --coverageReporters=text --coverageReporters=lcov
        working-directory: tests

      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: tests/coverage/frontend/lcov.info
          flags: frontend
          verbose: true
