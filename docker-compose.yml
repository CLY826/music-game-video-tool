# 音游视频练习辅助小程序 - Docker 本地开发环境
version: "3.8"

services:
  # 主开发服务：本地调试、运行测试
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rhythm-practice-dev
    volumes:
      # 挂载源码，本地修改实时同步到容器
      - .:/app
      # 排除 node_modules，使用容器内的依赖
      - /app/node_modules
    environment:
      - TOKENHUB_API_KEY=${TOKENHUB_API_KEY:-dev-placeholder}
      - NODE_ENV=development
    stdin_open: true
    tty: true
    # 启动健康检查服务 + 保持容器运行
    command: sh -c "node docker/health-server.js & tail -f /dev/null"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # 测试服务：CI 友好，运行完即退出
  app-test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rhythm-practice-test
    volumes:
      - .:/app
    environment:
      - TOKENHUB_API_KEY=test-placeholder
      - NODE_ENV=test
    command: npm test
    restart: "no"
